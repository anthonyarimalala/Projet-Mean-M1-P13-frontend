<section class="page-header">
  <h2>Boutiques</h2>
  <p>Parcourez les boutiques et decouvrez leurs articles.</p>
</section>

<div class="shop-filter">
  <label>
    Filtrer par categorie
    <input
      type="text"
      placeholder="Ex: Mode, Electronique"
      [(ngModel)]="categoryFilter"
      name="categoryFilter"
    />
  </label>
</div>

<div class="shop-grid">
  @for (shop of filteredShops; track shop.id) {
    <a class="shop-card" [routerLink]="[shop.id]">
      <div class="shop-image">
        @if (shop.imageUrl) {
          <img [src]="shop.imageUrl" [alt]="shop.name" />
        } @else {
          <span>{{ shop.name.charAt(0) }}</span>
        }
      </div>
      <div>
        <h3>{{ shop.name }}</h3>
        <p class="category">{{ shop.category }}</p>
        <p class="location">{{ shop.location }}</p>
        <p class="description">{{ shop.description }}</p>
      </div>
    </a>
  }
</div>
