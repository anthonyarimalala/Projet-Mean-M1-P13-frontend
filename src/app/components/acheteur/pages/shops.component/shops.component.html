<section class="page-header">
  <h2>Boutiques</h2>
  <p>Parcourez les boutiques et découvrez leurs articles.</p>
</section>

<div class="shop-filter">
  <label>
    Filtrer par catégorie
    <input
      type="text"
      placeholder="Ex: Mode, Electronique"
      [(ngModel)]="categoryFilter"
      name="categoryFilter"
    />
  </label>
</div>

<div class="shop-grid">
  <a
    *ngFor="let shop of filteredShops()"
    class="shop-card"
    [routerLink]="['/acheteur/boutiques', shop.mongoId]"
    (click)="onShopClick(shop.mongoId)"
  >
    <div class="shop-image">
      <span>{{ shop.name.charAt(0) }}</span>
    </div>
    <div>
      <h3>{{ shop.name }}</h3>
      <p class="category">{{ shop.category }}</p>
      <p class="location">{{ shop.location }}</p>
      <p class="description">{{ shop.description }}</p>
    </div>
  </a>

  <div *ngIf="filteredShops().length === 0" class="no-results">
    <p>Aucune boutique trouvée</p>
  </div>
</div>
