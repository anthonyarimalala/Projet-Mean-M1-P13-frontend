<section class="shop-header">
  <div>
    <a class="back-link" routerLink="/acheteur/boutiques">&larr; Retour</a>

  </div>
</section>

<section class="articles">
  <h3>Articles</h3>
  <div class="article-grid">
    <div class="article-card" *ngFor="let article of articles()">
      <div class="article-image">
        <ng-template #noImage>
          <span>{{ article.name.charAt(0) }}</span>
        </ng-template>
      </div>

      <div class="article-body">
        <h4>{{ article.name }}</h4>
        <p class="price">{{ article.price | number: '1.0-0' }} MGA</p>
        <p class="description">{{ article.description }}</p>

        <!-- Stock personnalisé -->
        <p class="stock">
          <ng-container *ngIf="stockMap()[article.id] !== undefined">
            <span *ngIf="stockMap()[article.id] > 0">
              Stock disponible : <strong>{{ stockMap()[article.id] }}</strong>
            </span>
            <span *ngIf="stockMap()[article.id] === 0" class="out-of-stock">
              ❌ Article non disponible
            </span>
          </ng-container>
          <ng-container *ngIf="stockMap()[article.id] === undefined">
            ⏳ Chargement...
          </ng-container>
        </p>

        <button 
          *ngIf="stockMap()[article.id] > 0" 
          (click)="addToCart(article)"
          class="add-to-cart-btn">
          Ajouter au panier
        </button>
      </div>
    </div>
  </div>
</section>
