<div class="stats-section">
  <h3 class="section-title">Boutiques</h3>
  <div class="stats-grid">
    <div class="stat-card total">
      <div class="stat-icon">🏪</div>
      <div class="stat-content">
        <span class="stat-label">Total</span>
        <span class="stat-value">{{ stats.total }}</span>
      </div>
    </div>

    <div class="stat-card disponible">
      <div class="stat-icon">✅</div>
      <div class="stat-content">
        <span class="stat-label">Disponibles</span>
        <span class="stat-value">{{ stats.disponibles }}</span>
      </div>
    </div>

    <div class="stat-card non-disponible">
      <div class="stat-icon">❌</div>
      <div class="stat-content">
        <span class="stat-label">Non disponibles</span>
        <span class="stat-value">{{ stats.nonDisponibles }}</span>
      </div>
    </div>

    <div class="stat-card en-attente">
      <div class="stat-icon">⏳</div>
      <div class="stat-content">
        <span class="stat-label">En attente</span>
        <span class="stat-value">{{ stats.enAttente }}</span>
      </div>
    </div>

    <div class="stat-card validee">
      <div class="stat-icon">✓</div>
      <div class="stat-content">
        <span class="stat-label">Validées</span>
        <span class="stat-value">{{ stats.validees }}</span>
      </div>
    </div>
  </div>
</div>
