<section class="page-head">
  <div>
    <h1>Nouvelle boutique</h1>
    <p>Créez un nouveau local commercial</p>
  </div>
  <div class="actions">
    <button
      class="primary"
      (click)="onSubmit()"
      [disabled]="isLoading"
    >
      <span *ngIf="!isLoading">Enregistrer</span>
      <span *ngIf="isLoading" class="spinner"></span>
      <span *ngIf="isLoading" style="margin-left: 8px;">Enregistrement...</span>
    </button>
  </div>
</section>

<!-- Messages de notification -->
<div class="notification-container">
  <div *ngIf="successMessage" class="notification success">
    <span class="notification-icon">✓</span>
    <span>{{ successMessage }}</span>
    <button class="notification-close" (click)="successMessage = null">×</button>
  </div>

  <div *ngIf="errorMessage" class="notification error">
    <span class="notification-icon">⚠</span>
    <span>{{ errorMessage }}</span>
    <button class="notification-close" (click)="errorMessage = null">×</button>
  </div>
</div>

<form [formGroup]="createForm" (ngSubmit)="onSubmit()">
  <!-- Le reste du formulaire reste identique -->
  <section class="panel">
    <h2>Informations générales</h2>
    <div class="form-grid">
      <label class="field">
        <span>Numéro du local</span>
        <input type="text" formControlName="numero" placeholder="Ex: A12" />
        <span *ngIf="createForm.get('numero')?.touched && createForm.get('numero')?.errors" class="field-error">
          Ce champ est requis
        </span>
      </label>

      <label class="field">
        <span>Étage</span>
        <input type="number" formControlName="etage" min="0" max="10" />
        <span *ngIf="createForm.get('etage')?.touched && createForm.get('etage')?.errors" class="field-error">
          L'étage est requis et doit être ≥ 0
        </span>
      </label>

      <label class="field switch">
        <span>Disponible</span>
        <input type="checkbox" formControlName="is_disponible" />
        <div class="track"></div>
      </label>

      <label class="field">
        <span>Prix (Ar)</span>
        <input type="number" formControlName="prix" min="0" step="1000" placeholder="8 900 000" />
        <span *ngIf="createForm.get('prix')?.touched && createForm.get('prix')?.errors" class="field-error">
          Le prix doit être ≥ 0
        </span>
      </label>
    </div>
  </section>

  <section class="panel">
    <h2>Promotion</h2>
    <div class="form-grid">
      <label class="field switch">
        <span>Promotion active</span>
        <input type="checkbox" formControlName="promotionActive" />
        <div class="track"></div>
      </label>

      <label class="field">
        <span>Taux de promotion (%)</span>
        <input type="number" formControlName="promotionTaux" min="0" max="100" step="1" />
        <span *ngIf="createForm.get('promotionTaux')?.touched && createForm.get('promotionTaux')?.errors" class="field-error">
          Le taux doit être entre 0 et 100
        </span>
      </label>
    </div>
  </section>

  <section class="panel">
    <h2>Informations boutique</h2>
    <div class="form-grid">
      <label class="field">
        <span>Nom de la boutique</span>
        <input type="text" formControlName="nom_boutique" placeholder="Tech World" />
      </label>
    </div>
  </section>

  <section class="panel">
    <h2>Catégories</h2>
    <fieldset class="field">
      <legend>Sélectionnez les catégories</legend>
      <div class="checkbox-group">
        <label class="option">
          <input type="checkbox" [checked]="isCategorySelected('CAT_01')" (change)="toggleCategory('CAT_01')" />
          CAT_01 - Électronique
        </label>
        <label class="option">
          <input type="checkbox" [checked]="isCategorySelected('CAT_02')" (change)="toggleCategory('CAT_02')" />
          CAT_02 - Informatique
        </label>
        <label class="option">
          <input type="checkbox" [checked]="isCategorySelected('CAT_03')" (change)="toggleCategory('CAT_03')" />
          CAT_03 - Téléphonie
        </label>
        <label class="option">
          <input type="checkbox" [checked]="isCategorySelected('CAT_04')" (change)="toggleCategory('CAT_04')" />
          CAT_04 - Accessoires
        </label>
      </div>
    </fieldset>
  </section>
</form>
